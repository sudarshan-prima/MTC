<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">

    <title>Admin - Today's Rates Update | Mayureshwar Trading Company</title>

    <!-- Google Analytics (Placeholder - Replace G-XXXXXXXXXX with your actual ID) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@300;400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-body">

    <!-- Login Container -->
    <div id="login-container" class="admin-container">
        <div class="admin-card">
            <h2 class="admin-title">Admin Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="text" id="mobile" required placeholder="Enter 10-digit mobile number">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter password">
                </div>
                <div id="login-error" class="error-msg"></div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
        </div>
    </div>

    <!-- Admin Dashboard (Rates Form) -->
    <div id="dashboard-container" class="admin-container hidden">
        <div class="admin-card dashboard-card">
            <div class="dashboard-header">
                <h2 class="admin-title">Update Today's Rates (आजचे बाजारभाव)</h2>
                <button id="logout-btn" class="btn btn-secondary btn-sm">Logout</button>
            </div>
            <p class="admin-info">Enter the <strong>Kamal</strong> (Max) and <strong>Kiman</strong> (Min) rates. <strong>Sarasari</strong> (Average) will be calculated automatically.</p>
            
            <form id="rates-form">
                <div class="table-responsive">
                    <table class="rates-table input-table">
                        <thead>
                            <tr>
                                <th>Crop (शेतमाल)</th>
                                <th>Kiman (किमान) ₹</th>
                                <th>Kamal (कमाल) ₹</th>
                                <th>Sarasari (सरासरी) ₹</th>
                            </tr>
                        </thead>
                        <tbody id="rates-tbody">
                            <!-- Rows generated by admin.js -->
                        </tbody>
                    </table>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Rates to Website</button>
                    <div id="save-msg" class="success-msg"></div>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
